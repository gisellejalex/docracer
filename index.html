<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocRacer — Learn by Typing</title>
    <style>
      * { margin: 0; padding: 0; }
      body { background: #08080f; }
    </style>
    <script>
      // Storage polyfill - must run before React app loads
      if (!window.storage || typeof window.storage.get !== 'function') {
        window.storage = {
          get: function(k) { try { var v = localStorage.getItem('docracer:'+k); return Promise.resolve(v !== null ? {key:k, value:v, shared:false} : null); } catch(e) { return Promise.resolve(null); } },
          set: function(k,v) { try { localStorage.setItem('docracer:'+k, v); return Promise.resolve({key:k, value:v, shared:false}); } catch(e) { return Promise.resolve(null); } },
          delete: function(k) { try { localStorage.removeItem('docracer:'+k); return Promise.resolve({key:k, deleted:true, shared:false}); } catch(e) { return Promise.resolve(null); } },
          list: function(p) { p=p||''; try { var keys=[]; for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf('docracer:'+p)===0)keys.push(k.replace('docracer:',''));} return Promise.resolve({keys:keys,prefix:p,shared:false}); } catch(e) { return Promise.resolve({keys:[],prefix:p,shared:false}); } }
        };
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
